---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/tags":
    get:
      summary: List tags
      tags:
      - Tags
      responses:
        '200':
          description: successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                  required:
                  - id
                  - name
    post:
      summary: Create tag
      tags:
      - Tags
      parameters: []
      responses:
        '201':
          description: tag created
        '422':
          description: validation error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
              - name
  "/api/v1/tags/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Get tag by ID
      tags:
      - Tags
      responses:
        '200':
          description: tag found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  system:
                    type: boolean
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                required:
                - id
                - name
                - system
                - created_at
                - updated_at
        '404':
          description: tag not found
    patch:
      summary: Update tag
      tags:
      - Tags
      parameters: []
      responses:
        '200':
          description: tag updated
        '404':
          description: tag not found
        '422':
          description: system tag cannot be modified
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
    delete:
      summary: Delete tag
      tags:
      - Tags
      responses:
        '204':
          description: tag deleted
        '404':
          description: tag not found
        '422':
          description: system tag cannot be deleted
  "/api/v1/tasks":
    get:
      summary: List tasks
      tags:
      - Tasks
      parameters:
      - name: status
        in: query
        enum:
        - scheduled
        - completed
        required: false
        schema:
          type: string
        description: ":\n * `scheduled` \n * `completed` \n "
      - name: date_from
        in: query
        format: date
        required: false
        schema:
          type: string
      - name: date_to
        in: query
        format: date
        required: false
        schema:
          type: string
      responses:
        '200':
          description: successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    scheduled_date:
                      type: string
                      format: date
                    status:
                      type: string
                      enum:
                      - scheduled
                      - completed
                    tags:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                  required:
                  - id
                  - title
                  - scheduled_date
                  - status
                  - tags
    post:
      summary: Create task
      tags:
      - Tasks
      parameters: []
      responses:
        '201':
          description: task created
        '422':
          description: validation error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                scheduled_date:
                  type: string
                  format: date
                status:
                  type: string
                  enum:
                  - scheduled
                  - completed
                schedule_type:
                  type: string
                  enum:
                  - once
                  - daily
                  - monthly_specific_date
                  - specific_dates
                  - odd_even_days
                schedule_options:
                  type: object
                active:
                  type: boolean
                tag_ids:
                  type: array
                  items:
                    type: integer
              required:
              - title
              - scheduled_date
  "/api/v1/tasks/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get task by ID
      tags:
      - Tasks
      responses:
        '200':
          description: task found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  description:
                    type: string
                    nullable: true
                  scheduled_date:
                    type: string
                    format: date
                  status:
                    type: string
                    enum:
                    - scheduled
                    - completed
                  schedule_type:
                    type: string
                  schedule_options:
                    type: object
                  start_date:
                    type: string
                    format: date
                  active:
                    type: boolean
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                  tags:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                required:
                - id
                - title
                - description
                - scheduled_date
                - status
                - schedule_type
                - schedule_options
                - start_date
                - active
                - created_at
                - updated_at
                - tags
        '404':
          description: task not found
    patch:
      summary: Update task
      tags:
      - Tasks
      parameters: []
      responses:
        '200':
          description: task updated
        '404':
          description: task not found
        '422':
          description: validation error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                scheduled_date:
                  type: string
                  format: date
                status:
                  type: string
                  enum:
                  - scheduled
                  - completed
                schedule_type:
                  type: string
                  enum:
                  - once
                  - daily
                  - monthly_specific_date
                  - specific_dates
                  - odd_even_days
                schedule_options:
                  type: object
                active:
                  type: boolean
                tag_ids:
                  type: array
                  items:
                    type: integer
    delete:
      summary: Delete task
      tags:
      - Tasks
      responses:
        '204':
          description: task deleted
        '404':
          description: task not found
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
