---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/v1/tasks":
    get:
      summary: List tasks
      tags:
      - Tasks
      responses:
        '200':
          description: successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    scheduled_date:
                      type: string
                      format: date
                    status:
                      type: string
                      enum:
                      - scheduled
                      - completed
                  required:
                  - id
                  - title
                  - scheduled_date
                  - status
    post:
      summary: Create task
      tags:
      - Tasks
      parameters: []
      responses:
        '201':
          description: task created
        '422':
          description: validation error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                scheduled_date:
                  type: string
                  format: date
                status:
                  type: string
                  enum:
                  - scheduled
                  - completed
              required:
              - title
              - scheduled_date
  "/api/v1/tasks/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Get task by ID
      tags:
      - Tasks
      responses:
        '200':
          description: task found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  description:
                    type: string
                    nullable: true
                  scheduled_date:
                    type: string
                    format: date
                  status:
                    type: string
                    enum:
                    - scheduled
                    - completed
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                required:
                - id
                - title
                - description
                - scheduled_date
                - status
                - created_at
                - updated_at
        '404':
          description: task not found
    patch:
      summary: Update task
      tags:
      - Tasks
      parameters: []
      responses:
        '200':
          description: task updated
        '404':
          description: task not found
        '422':
          description: validation error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                scheduled_date:
                  type: string
                  format: date
                status:
                  type: string
                  enum:
                  - scheduled
                  - completed
    delete:
      summary: Delete task
      tags:
      - Tasks
      responses:
        '204':
          description: task deleted
        '404':
          description: task not found
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
